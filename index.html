<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solarium</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="canvas-container"></div>
    <div id="labels-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;"></div>

    <div id="ui-wrapper">
        <button id="ui-toggle-btn">◀</button>
        
        <div id="ui-container">
            <h2>Solarium</h2>
            <p style="font-size: 11px; color: #888; margin-top: -8px; margin-bottom: 15px;">(c) 2026 Ian Riley // ianthomasriley@gmail.com</p>
            <hr>
            <button id="add-planet-btn">+ Add Planet</button>
            <button id="add-belt-btn" style="background: #8b5cf6;">+ Add Asteroid Belt</button>
            <button id="add-comet-btn" style="background: #06b6d4;">+ Add Comet</button>
            <button id="share-btn">Copy Share Link</button>
            
            <div style="margin: 15px 0; display: flex; flex-direction: column; gap: 8px; font-size: 14px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="toggle-always-show" style="cursor: pointer;">
                    <label for="toggle-always-show" style="cursor: pointer; user-select: none;">Always Show Labels</label>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="toggle-outlines" style="cursor: pointer;">
                    <label for="toggle-outlines" style="cursor: pointer; user-select: none;">Show Planet Outlines</label>
                </div>
            </div>

            <div id="planet-list"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script src="app.js"></script>
</body>
</html>
